enabled: true
generation: 0
num_candidates: 8
selection_strategy: uniform
eval_experiments: [cifar_convnet, minigpt_wikitext2]
eval_mode: smoke
timeout_sec_per_eval: 7200
max_retries_per_eval: 0
fail_fast: false
resume: true
force: false
max_proposal_jobs: 4
max_evaluation_jobs: null
max_generation_attempts: 3

eval_entrypoint_module: src.validate.run_one

evolution:
  max_generations: 100
  population_size: 20
  elite_count: 5
  mutation_rate: 0.7
  crossover_rate: 0.3
  tournament_size: 3
  great_filter_interval: 5

evaluation:
  simple_experiments: [synthetic_logreg, mnist_mlp]
  hard_experiments: [cifar_convnet, audio_transformer, minigpt_wikitext2, ddpm_cifar10, lora_sft]

  simple_allocation:
    enabled: true
    method: neyman
    sample_size: 2
    history_window: 100
    min_history_for_variance: 3
    std_floor: 1.0e-6

  hard_allocation:
    enabled: false

allocation:
  enabled: true
  method: neyman
  history_window: 100
  sample_size: 2
  min_history_for_variance: 3
  std_floor: 1.0e-6
  fallback: uniform
  costs:
    cifar_convnet: 1.0
    minigpt_wikitext2: 1.0
  score_weights:
    quality: 0.7
    steps: 0.3

novelty_filter:
  enabled: false

bandit_llm_selection:
  enabled: false

llm:
  provider: chatgpt
  model: gpt-5.4-pro
  temperature: 0.5
  max_output_tokens: 8000
  reasoning_effort: xhigh
  seed: 123
  fallback_to_chat_completions: true
