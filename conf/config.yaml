defaults:
  - _self_
  - evolver: default
  - api_platforms@api_platforms.mock: mock
  - experiments@experiments.cifar_convnet: optimization_survey/cifar_convnet
  - experiments@experiments.audio_transformer: optimization_survey/audio_transformer
  - experiments@experiments.minigpt_wikitext2: optimization_survey/minigpt_wikitext2
  - experiments@experiments.ddpm_cifar10: optimization_survey/ddpm_cifar10
  - experiments@experiments.lora_sft: optimization_survey/lora_sft
  - experiments@experiments.synthetic_logreg: optimization_survey/synthetic_logreg
  - experiments@experiments.mnist_mlp: optimization_survey/mnist_mlp
  - experiments@experiments.poly_regression: optimization_survey/poly_regression
  - experiments@experiments.rosenbrock_net: optimization_survey/rosenbrock_net
  - experiments@experiments.xor_mlp: optimization_survey/xor_mlp
  - experiments@experiments.sin_regression: optimization_survey/sin_regression
  - experiments@experiments.matrix_factorization: optimization_survey/matrix_factorization
  - experiments@experiments.tiny_autoencoder: optimization_survey/tiny_autoencoder
  - experiments@experiments.two_spirals: optimization_survey/two_spirals
  - experiments@experiments.linear_denoiser: optimization_survey/linear_denoiser
  - experiments@experiments.conv1d_classify: optimization_survey/conv1d_classify
  - experiments@experiments.quadratic_bowl: optimization_survey/quadratic_bowl

mode: run
organism_dir: null
seed: 42
deterministic: false
device: cuda
precision: bf16
num_workers: 4

resources:
  num_gpus: 1
  gpu_ids: null

safety:
  detect_nan: true
  abort_on_nan: true
  grad_clip_norm: null
  log_grad_norm: true

paths:
  data_root: ${oc.env:VALOPT_DATA_ROOT,./data}
  stats_root: ${oc.env:VALOPT_STATS_ROOT,./stats}
  runs_root: ${oc.env:VALOPT_RUNS_ROOT,./runs}
  candidate_results_dirname: results
  population_root: ${oc.env:POP_ROOT,./populations}
  api_platform_runtime_root: ${oc.env:API_PLATFORM_RUNTIME_ROOT,./.api_platform_runtime}

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  output_subdir: hydra
  job:
    chdir: false
