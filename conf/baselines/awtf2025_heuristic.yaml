# @package _global_
# ``_global_`` promotes everything in this file (and its `defaults:`
# inheritance) to the root of the composed config. Without this directive
# Hydra nests the contents under ``baselines.*`` because the file lives in
# ``conf/baselines/``, which breaks ``src/baselines/shinka/run.py`` —
# it reads ``cfg.shinka_evolve`` / ``cfg.evolver.llm.route_weights`` at the
# top level.
defaults:
  - /config_awtf2025_heuristic
  - _self_

# Route-weight override for the baseline run only. The shipped main config
# keeps both ``ollama_gemma4_31b`` and ``ollama_qwen35_122b`` enabled so
# the evolutionary loop's pipeline bandit can compare them. For this
# baseline we want the entire ShinkaEvolve stack on qwen 122B only — set
# gemma's weight to 0 so :func:`build_shinka_model_urls` filters it out
# and ShinkaEvolve sees only qwen URLs (one per launched ollama
# instance).
#
# Note: the ollama runtime starter (``lib_runtime.sh``) iterates every
# route in ``api_platforms`` regardless of weight, so the two gemma
# instances on GPUs 6 and 7 will still start; they just won't receive
# any traffic. To reclaim those GPUs for qwen, also override
# ``api_platforms.ollama_qwen35_122b.gpu_ranks`` (e.g. ``[[0,1,2,3],
# [4,5,6,7]]``) and remove gemma from the defaults list.
evolver:
  llm:
    route_weights:
      ollama_gemma4_31b: 0.0
      ollama_qwen35_122b: 1.0

shinka_evolve:
  enabled: true
  initial_program_path: experiments/awtf2025_heuristic/_baselines/shinka/initial_program.py
  evaluate_program_path: experiments/awtf2025_heuristic/_baselines/shinka/evaluate.py
  results_dir: ${oc.env:SHINKA_RESULTS_DIR,./shinka_runs/awtf2025_heuristic}
  num_generations: 50
  num_islands: 4
  # 2 qwen instances × 2 per-instance concurrency = 4 parallel evaluators.
  max_parallel_jobs: 4
  llm_dynamic_selection: ucb1
  cost_aware_coef: 0.0
  llm_models: null
  embedding_model: null
  extra_runner_kwargs: {}
