# Shared evolver for the CO-Bench family. ONE evolver serves every task; the
# active task's seed_program_path and prompts.project_context are overridden by
# conf/config_co-bench.yaml via the CO_BENCH_TASK selector (defaults below are
# TSP so this composes standalone). Cloned from circle_packing_shinka.
resume: true
max_generations: 150
max_organism_creations: false
max_retries_per_eval: 0

max_tokens_per_model:
  ollama_gemma4_31b: false
  ollama_qwen35_122b: false

creation:
  max_attempts_to_create_organism: 1
  max_attempts_to_repair_organism_after_error: 2
  max_attempts_to_regenerate_organism_after_novelty_rejection: 0
  max_parallel_organisms: 8

islands:
  mode: from_seed
  seed_program_path: experiments/co_bench/_baselines/shinka/tsp/initial_program.py
  island_ids: [co_bench_default]
  seeds_per_island: 5
  max_organisms_per_island: 10

prompts:
  project_context: conf/experiments/co-bench/prompts/tsp/project_context.txt
  genome_schema: conf/experiments/co-bench/prompts/shared/genome_schema.txt

  seed_system: conf/experiments/co-bench/prompts/seed/system.txt
  seed_user: conf/experiments/co-bench/prompts/seed/user.txt

  mutation_system: conf/experiments/co-bench/prompts/mutation/system.txt
  mutation_user: conf/experiments/co-bench/prompts/mutation/user.txt
  mutation_novelty_system: conf/experiments/co-bench/prompts/novelty/mutation/system.txt
  mutation_novelty_user: conf/experiments/co-bench/prompts/novelty/mutation/user.txt
  mutation_rationalization_system: conf/experiments/co-bench/prompts/rationalization/mutation/system.txt
  mutation_rationalization_user: conf/experiments/co-bench/prompts/rationalization/mutation/user.txt

  crossover_system: conf/experiments/co-bench/prompts/crossover/system.txt
  crossover_user: conf/experiments/co-bench/prompts/crossover/user.txt
  crossover_novelty_system: conf/experiments/co-bench/prompts/novelty/crossover/system.txt
  crossover_novelty_user: conf/experiments/co-bench/prompts/novelty/crossover/user.txt
  crossover_rationalization_system: conf/experiments/co-bench/prompts/rationalization/crossover/system.txt
  crossover_rationalization_user: conf/experiments/co-bench/prompts/rationalization/crossover/user.txt

  implementation_system: conf/experiments/co-bench/prompts/implementation/system.txt
  implementation_user: conf/experiments/co-bench/prompts/implementation/user.txt
  implementation_template: conf/experiments/co-bench/prompts/shared/template.txt
  repair_system: conf/experiments/co-bench/prompts/repair/system.txt
  repair_user: conf/experiments/co-bench/prompts/repair/user.txt

  num_inspirations: 0

reproduction:
  offspring_per_generation: 6
  operator_selection_strategy: random
  operator_weights:
    within_island_crossover: 0.7
    inter_island_crossover: 0.2
    mutation: 0.2
  island_sampling:
    within_island_crossover: unified
    inter_island_crossover: unified
    mutation: unified
  parent_island_sampling:
    strategy: bandit
    bandit:
      algorithm: discounted_thompson
      discount: 0.97
      prior_alpha: 1.0
      prior_beta: 1.0
      reward_mode: score_quantile
      reward_window: 50
      survival_weight: 0.3
  cross_island_partner_sampling:
    strategy: bandit
    bandit:
      algorithm: discounted_thompson
      discount: 0.97
      prior_alpha: 1.0
      prior_beta: 1.0
      reward_mode: score_quantile
      reward_window: 50
      survival_weight: 0.3
  species_sampling:
    strategy: weighted_rule
    weighted_rule_lambda: 1.0
    mutation_softmax_temperature: 1.0
    within_island_crossover_softmax_temperature: 1.0
    inter_island_crossover_softmax_temperature: 1.0
  selection_score:
    mode: weighted_sum
    normalize_weights: true
    weights:
      simple_score: 1.0
      inheritance_fitness: 0.0

operators:
  mutation:
    gene_removal_probability: 0.1
  crossover:
    primary_parent_gene_inheritance_probability: 0.7

phases:
  simple:
    eval_mode: full
    timeout_sec_per_eval: 120
    experiments:
      - co_bench
    allocation:
      enabled: false
  great_filter:
    enabled: false
    interval_generations: 5
    eval_mode: full
    timeout_sec_per_eval: 120
    top_h_per_island: 5
    experiments:
      - co_bench
    allocation:
      enabled: false

llm:
  selection_strategy: random
  seed: 123

  route_weights:
    ollama_gemma4_31b: 1.0

  route_sampling:
    strategy: bandit
    bandit:
      algorithm: discounted_thompson
      discount: 0.97
      prior_alpha: 1.0
      prior_beta: 1.0
      reward_mode: score_quantile
      reward_window: 50
      survival_weight: 0.3

  # Mirrors the atcoder (awtf2025_heuristic) setup: qwen 3.5 122B runs the
  # creative stages (rationalization, design, implementation); gemma 4 31B
  # runs the cheap validator stages (novelty, repair).
  pipelines:
    - id: qwen_creative_gemma_check
      stages:
        rationalization: ollama_qwen35_122b
        design: ollama_qwen35_122b
        implementation: ollama_qwen35_122b
        novelty: ollama_gemma4_31b
        repair: ollama_gemma4_31b

  pipeline_sampling:
    strategy: bandit
    bandit:
      algorithm: discounted_thompson
      discount: 0.97
      prior_alpha: 1.0
      prior_beta: 1.0
      reward_mode: score_quantile
      reward_window: 50
      survival_weight: 0.3
