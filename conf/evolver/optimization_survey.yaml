resume: true
max_generations: 100
# false or -1 disables this cap. If both generation and organism caps are enabled,
# evolution stops at whichever cap is reached first.
max_organism_creations: false
max_retries_per_eval: 0

# Optional per-model token-budget stop (additional to the generation/organism
# caps above, not a replacement). Maps route_id -> token cap. ``false`` (the
# default for every model) means no cap on that model; an integer caps the
# cumulative LLM tokens that route may spend. When any capped route reaches its
# budget, evolution stops at the next generation boundary. Tokens are summed
# from each organism's persisted ``token_usage`` so the tally is resume-safe.
max_tokens_per_model:
  mock: false

creation:
  max_attempts_to_create_organism: 3
  max_attempts_to_repair_organism_after_error: 2
  max_attempts_to_regenerate_organism_after_novelty_rejection: 2
  max_parallel_organisms: 4

islands:
  # ``from_seed`` is the only supported mode. See
  # conf/evolver/awtf2025_heuristic.yaml for details.
  mode: from_seed
  seed_program_path: experiments/optimization_survey/_baselines/initial_program.py
  island_ids: [gradient_methods, adaptive_methods, quasi_newton, second_order]
  seeds_per_island: 5
  max_organisms_per_island: 5

prompts:
  project_context: conf/experiments/optimization_survey/prompts/shared/project_context.txt
  genome_schema: conf/experiments/optimization_survey/prompts/shared/genome_schema.txt

  seed_system: conf/experiments/optimization_survey/prompts/seed/system.txt
  seed_user: conf/experiments/optimization_survey/prompts/seed/user.txt

  mutation_system: conf/experiments/optimization_survey/prompts/mutation/system.txt
  mutation_user: conf/experiments/optimization_survey/prompts/mutation/user.txt
  mutation_novelty_system: conf/experiments/optimization_survey/prompts/novelty/mutation/system.txt
  mutation_novelty_user: conf/experiments/optimization_survey/prompts/novelty/mutation/user.txt

  crossover_system: conf/experiments/optimization_survey/prompts/crossover/system.txt
  crossover_user: conf/experiments/optimization_survey/prompts/crossover/user.txt
  crossover_novelty_system: conf/experiments/optimization_survey/prompts/novelty/crossover/system.txt
  crossover_novelty_user: conf/experiments/optimization_survey/prompts/novelty/crossover/user.txt

  implementation_system: conf/experiments/optimization_survey/prompts/implementation/system.txt
  implementation_user: conf/experiments/optimization_survey/prompts/implementation/user.txt
  implementation_template: conf/experiments/optimization_survey/prompts/shared/template.txt
  repair_system: conf/experiments/optimization_survey/prompts/repair/system.txt
  repair_user: conf/experiments/optimization_survey/prompts/repair/user.txt

reproduction:
  offspring_per_generation: 10
  operator_selection_strategy: deterministic
  operator_weights:
    within_island_crossover: 1.0
    inter_island_crossover: 1.0
    mutation: 1.0
  island_sampling:
    within_island_crossover: unified
    inter_island_crossover: unified
    mutation: unified
  parent_island_sampling:
    strategy: uniform                  # uniform | bandit
    bandit:
      algorithm: discounted_thompson
      discount: 0.97
      prior_alpha: 1.0
      prior_beta: 1.0
      reward_mode: score_quantile
      reward_window: 50
      survival_weight: 0.3
  cross_island_partner_sampling:
    strategy: uniform                  # uniform | bandit
    bandit:
      algorithm: discounted_thompson
      discount: 0.97
      prior_alpha: 1.0
      prior_beta: 1.0
      reward_mode: score_quantile
      reward_window: 50
      survival_weight: 0.3
  species_sampling:
    strategy: weighted_rule
    weighted_rule_lambda: 1.0
    mutation_softmax_temperature: 1.0
    within_island_crossover_softmax_temperature: 1.0
    inter_island_crossover_softmax_temperature: 1.0
  selection_score:
    mode: weighted_sum
    normalize_weights: true
    weights:
      simple_score: 1.0
      inheritance_fitness: 0.0

operators:
  mutation:
    gene_removal_probability: 0.2
  crossover:
    primary_parent_gene_inheritance_probability: 0.7

phases:
  simple:
    eval_mode: smoke
    timeout_sec_per_eval: 7200
    experiments:
      - synthetic_logreg
      - mnist_mlp
      - poly_regression
      - rosenbrock_net
      - xor_mlp
      - sin_regression
      - matrix_factorization
      - tiny_autoencoder
      - two_spirals
      - linear_denoiser
      - conv1d_classify
      - quadratic_bowl
    allocation:
      enabled: true
      method: neyman
      sample_size: 2
      history_window: 100
      min_history_for_variance: 3
      std_floor: 1.0e-6
      fallback: uniform
  great_filter:
    enabled: true
    interval_generations: 5
    eval_mode: full
    timeout_sec_per_eval: 7200
    top_h_per_island: 3
    experiments:
      - cifar_convnet
      - audio_transformer
      - minigpt_wikitext2
      - ddpm_cifar10
      - lora_sft
    allocation:
      enabled: false

llm:
  selection_strategy: random
  route_weights:
    mock: 1.0
  seed: 123

  route_sampling:
    strategy: weighted_static          # uniform | weighted_static | bandit
    bandit:
      algorithm: discounted_thompson
      discount: 0.97
      prior_alpha: 1.0
      prior_beta: 1.0
      reward_mode: score_quantile
      reward_window: 50
      survival_weight: 0.3
