resume: true
max_generations: 700
# false or -1 disables this cap. If both generation and organism caps are enabled,
# evolution stops at whichever cap is reached first.
max_organism_creations: false
max_retries_per_eval: 0

# Optional per-model token-budget stop (additional to the generation/organism
# caps above, not a replacement). Maps route_id -> token cap. ``false`` (the
# default for every model) means no cap on that model; an integer caps the
# cumulative LLM tokens that route may spend. When any capped route reaches its
# budget, evolution stops at the next generation boundary. Tokens are summed
# from each organism's persisted ``token_usage`` so the tally is resume-safe.
max_tokens_per_model:
  ollama_gemma4_31b: false
  ollama_qwen35_122b: false

creation:
  # PHASE A retry tightening (mirrors awtf2025_heuristic): retries cut to 1,
  # validator-retries to 0. The repair budget for explicit evaluator errors
  # stays at 2 so a broken organism gets two shots at recovery.
  max_attempts_to_create_organism: 1
  max_attempts_to_repair_organism_after_error: 2
  max_attempts_to_regenerate_organism_after_novelty_rejection: 0
  max_parallel_organisms: 20

islands:
  # ``from_seed`` is the only supported mode. See
  # conf/evolver/awtf2025_heuristic.yaml for details.
  mode: from_seed
  seed_program_path: experiments/circle_packing_shinka/_baselines/shinka/initial_program.py
  island_ids: [packing_default]
  seeds_per_island: 5
  max_organisms_per_island: 10

prompts:
  project_context: conf/experiments/circle_packing_shinka/prompts/shared/project_context.txt
  genome_schema: conf/experiments/circle_packing_shinka/prompts/shared/genome_schema.txt

  seed_system: conf/experiments/circle_packing_shinka/prompts/seed/system.txt
  seed_user: conf/experiments/circle_packing_shinka/prompts/seed/user.txt

  mutation_system: conf/experiments/circle_packing_shinka/prompts/mutation/system.txt
  mutation_user: conf/experiments/circle_packing_shinka/prompts/mutation/user.txt
  mutation_novelty_system: conf/experiments/circle_packing_shinka/prompts/novelty/mutation/system.txt
  mutation_novelty_user: conf/experiments/circle_packing_shinka/prompts/novelty/mutation/user.txt
  mutation_rationalization_system: conf/experiments/circle_packing_shinka/prompts/rationalization/mutation/system.txt
  mutation_rationalization_user: conf/experiments/circle_packing_shinka/prompts/rationalization/mutation/user.txt

  crossover_system: conf/experiments/circle_packing_shinka/prompts/crossover/system.txt
  crossover_user: conf/experiments/circle_packing_shinka/prompts/crossover/user.txt
  crossover_novelty_system: conf/experiments/circle_packing_shinka/prompts/novelty/crossover/system.txt
  crossover_novelty_user: conf/experiments/circle_packing_shinka/prompts/novelty/crossover/user.txt
  crossover_rationalization_system: conf/experiments/circle_packing_shinka/prompts/rationalization/crossover/system.txt
  crossover_rationalization_user: conf/experiments/circle_packing_shinka/prompts/rationalization/crossover/user.txt

  implementation_system: conf/experiments/circle_packing_shinka/prompts/implementation/system.txt
  implementation_user: conf/experiments/circle_packing_shinka/prompts/implementation/user.txt
  implementation_template: conf/experiments/circle_packing_shinka/prompts/shared/template.txt
  repair_system: conf/experiments/circle_packing_shinka/prompts/repair/system.txt
  repair_user: conf/experiments/circle_packing_shinka/prompts/repair/user.txt

  # FunSearch / Shinka-style multi-program prompting: how many top-K
  # survivors from the parent's island to inline into Step 1 / Step 2
  # prompts (alongside the parent itself). Set to 0 to disable and fall
  # back to single-parent reasoning. Effective only after the survivor
  # pool has filled — early gens with too few survivors get an empty
  # block regardless.
  # PHASE A: 2 → 0 (mirrors awtf2025_heuristic). Each inspiration adds
  # ~5kB to design+impl prompts; the marginal value vs. cost was not
  # worth the latency hit. Re-enable after PHASE B if measured gain > 0.
  num_inspirations: 0

reproduction:
  offspring_per_generation: 6
  operator_selection_strategy: random
  operator_weights:
    within_island_crossover: 0.7
    inter_island_crossover: 0.2
    mutation: 0.2
  island_sampling:
    within_island_crossover: unified
    inter_island_crossover: unified
    mutation: unified
  # Adaptive parent-island sampling. See conf/evolver/awtf2025_heuristic.yaml
  # for the full description. For circle_packing the island_ids list is
  # currently a single island, so the bandit has only one arm and
  # behaviour is identical to uniform — kept on `bandit` so the config
  # matches awtf2025_heuristic and adding islands later requires no
  # config surgery.
  parent_island_sampling:
    strategy: bandit                   # uniform | bandit
    bandit:
      algorithm: discounted_thompson
      discount: 0.97
      prior_alpha: 1.0
      prior_beta: 1.0
      reward_mode: score_quantile      # survival | score_quantile | hybrid
      reward_window: 50
      survival_weight: 0.3
  # Adaptive partner-island sampling for inter_island_crossover. See
  # conf/evolver/awtf2025_heuristic.yaml for the full description.
  cross_island_partner_sampling:
    strategy: bandit                   # uniform | bandit
    bandit:
      algorithm: discounted_thompson
      discount: 0.97
      prior_alpha: 1.0
      prior_beta: 1.0
      reward_mode: score_quantile
      reward_window: 50
      survival_weight: 0.3
  species_sampling:
    strategy: weighted_rule
    weighted_rule_lambda: 1.0
    mutation_softmax_temperature: 1.0
    within_island_crossover_softmax_temperature: 1.0
    inter_island_crossover_softmax_temperature: 1.0
  selection_score:
    mode: weighted_sum
    normalize_weights: true
    weights:
      simple_score: 1.0
      inheritance_fitness: 0.0

operators:
  mutation:
    gene_removal_probability: 0.1
  crossover:
    primary_parent_gene_inheritance_probability: 0.7

phases:
  simple:
    eval_mode: full
    timeout_sec_per_eval: 120
    experiments:
      - unit_square_26
    allocation:
      enabled: false
  great_filter:
    enabled: false
    interval_generations: 5
    eval_mode: full
    timeout_sec_per_eval: 120
    top_h_per_island: 5
    experiments:
      - unit_square_26
    allocation:
      enabled: false

llm:
  selection_strategy: random
  seed: 123

  route_weights:
    ollama_gemma4_31b: 1.0

  # Adaptive LLM-route sampling. See conf/evolver/awtf2025_heuristic.yaml
  # for the full description. When `pipelines` (below) is defined and
  # non-empty this route path is bypassed for organism stages — the
  # pipeline mapping owns route selection.
  route_sampling:
    strategy: bandit                   # uniform | weighted_static | bandit
    bandit:
      algorithm: discounted_thompson
      discount: 0.97
      prior_alpha: 1.0
      prior_beta: 1.0
      reward_mode: score_quantile      # survival | score_quantile | hybrid
      reward_window: 50
      survival_weight: 0.3

  # Pipeline configurations. See conf/evolver/awtf2025_heuristic.yaml for
  # the full description of the canonical-stage taxonomy. Two pipelines
  # are defined here as a starting point: one all-gemma, one all-qwen.
  # Adding a "creative_qwen / validator_gemma" pipeline once a heavier
  # qwen model is brought up is straightforward — just append a new
  # entry below.
  pipelines:
    - id: qwen_creative_gemma_check
      stages:
        rationalization: ollama_qwen35_122b
        design: ollama_qwen35_122b
        implementation: ollama_qwen35_122b
        novelty: ollama_gemma4_31b
        repair: ollama_gemma4_31b

  pipeline_sampling:
    strategy: bandit                   # uniform | weighted_static | bandit
    bandit:
      algorithm: discounted_thompson
      discount: 0.97
      prior_alpha: 1.0
      prior_beta: 1.0
      reward_mode: score_quantile
      reward_window: 50
      survival_weight: 0.3
