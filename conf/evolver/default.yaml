enabled: true
generation: 0
resume: true
fail_fast: false
max_generations: 100
max_generation_attempts: 3

eval_entrypoint_module: src.validate.run_one
timeout_sec_per_eval: 7200
max_retries_per_eval: 0
max_proposal_jobs: 4
max_evaluation_jobs: null

prompts:
  project_context: conf/prompts/shared/project_context.txt
  seed_system: conf/prompts/seed/system.txt
  seed_user: conf/prompts/seed/user.txt
  mutation_system: conf/prompts/mutation/system.txt
  mutation_user: conf/prompts/mutation/user.txt
  crossover_system: conf/prompts/crossover/system.txt
  crossover_user: conf/prompts/crossover/user.txt

islands:
  dir: conf/prompts/islands
  organisms_per_island: 5
  inter_island_crossover_rate: 0.1

operators:
  mutation:
    probability: 0.5
    gene_delete_probability: 0.2
  crossover:
    inherit_gene_probability_from_mother: 0.7
    softmax_temperature: 1.0

phases:
  simple:
    eval_mode: smoke
    timeout_sec_per_eval: 7200
    top_k_per_island: 5
    experiments:
      - synthetic_logreg
      - mnist_mlp
      - poly_regression
      - rosenbrock_net
      - xor_mlp
      - sin_regression
      - matrix_factorization
      - tiny_autoencoder
      - two_spirals
      - linear_denoiser
      - conv1d_classify
      - quadratic_bowl
    allocation:
      enabled: true
      method: neyman
      sample_size: 2
      history_window: 100
      min_history_for_variance: 3
      std_floor: 1.0e-6
      fallback: uniform
  great_filter:
    enabled: true
    interval_generations: 5
    eval_mode: full
    timeout_sec_per_eval: 7200
    top_h_per_island: 3
    experiments:
      - cifar_convnet
      - audio_transformer
      - minigpt_wikitext2
      - ddpm_cifar10
      - lora_sft
    allocation:
      enabled: false

llm:
  provider: chatgpt
  model: gpt-5.4-pro
  temperature: 0.5
  max_output_tokens: 8000
  reasoning_effort: xhigh
  seed: 123
  fallback_to_chat_completions: true
