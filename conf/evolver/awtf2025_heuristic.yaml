resume: true
max_generations: 150
# false or -1 disables this cap. If both generation and organism caps are enabled,
# evolution stops at whichever cap is reached first.
max_organism_creations: false
max_retries_per_eval: 0

creation:
  max_attempts_to_create_organism: 3
  max_attempts_to_repair_organism_after_error: 2
  max_attempts_to_regenerate_organism_after_novelty_rejection: 2
  max_attempts_to_regenerate_organism_after_compatibility_rejection: 3
  max_parallel_organisms: 8

islands:
  dir: conf/experiments/awtf2025_heuristic/prompts/islands
  seed_organisms_per_island: 10
  max_organisms_per_island: 30

prompts:
  project_context: conf/experiments/awtf2025_heuristic/prompts/shared/project_context.txt
  genome_schema: conf/experiments/awtf2025_heuristic/prompts/shared/genome_schema.txt

  seed_system: conf/experiments/awtf2025_heuristic/prompts/seed/system.txt
  seed_user: conf/experiments/awtf2025_heuristic/prompts/seed/user.txt
  compatibility_seed_system: conf/experiments/awtf2025_heuristic/prompts/compatibility/seed/system.txt
  compatibility_seed_user: conf/experiments/awtf2025_heuristic/prompts/compatibility/seed/user.txt

  mutation_system: conf/experiments/awtf2025_heuristic/prompts/mutation/system.txt
  mutation_user: conf/experiments/awtf2025_heuristic/prompts/mutation/user.txt
  mutation_novelty_system: conf/experiments/awtf2025_heuristic/prompts/novelty/mutation/system.txt
  mutation_novelty_user: conf/experiments/awtf2025_heuristic/prompts/novelty/mutation/user.txt
  compatibility_mutation_system: conf/experiments/awtf2025_heuristic/prompts/compatibility/mutation/system.txt
  compatibility_mutation_user: conf/experiments/awtf2025_heuristic/prompts/compatibility/mutation/user.txt

  crossover_system: conf/experiments/awtf2025_heuristic/prompts/crossover/system.txt
  crossover_user: conf/experiments/awtf2025_heuristic/prompts/crossover/user.txt
  crossover_novelty_system: conf/experiments/awtf2025_heuristic/prompts/novelty/crossover/system.txt
  crossover_novelty_user: conf/experiments/awtf2025_heuristic/prompts/novelty/crossover/user.txt
  compatibility_crossover_system: conf/experiments/awtf2025_heuristic/prompts/compatibility/crossover/system.txt
  compatibility_crossover_user: conf/experiments/awtf2025_heuristic/prompts/compatibility/crossover/user.txt

  implementation_system: conf/experiments/awtf2025_heuristic/prompts/implementation/system.txt
  implementation_user: conf/experiments/awtf2025_heuristic/prompts/implementation/user.txt
  implementation_template: conf/experiments/awtf2025_heuristic/prompts/shared/template.txt
  repair_system: conf/experiments/awtf2025_heuristic/prompts/repair/system.txt
  repair_user: conf/experiments/awtf2025_heuristic/prompts/repair/user.txt

reproduction:
  offspring_per_generation: 15
  operator_selection_strategy: random
  operator_weights:
    within_island_crossover: 0.7
    inter_island_crossover: 0.2
    mutation: 0.2
  island_sampling:
    within_island_crossover: unified
    inter_island_crossover: unified
    mutation: unified
  species_sampling:
    strategy: weighted_rule
    weighted_rule_lambda: 1.0
    mutation_softmax_temperature: 1.0
    within_island_crossover_softmax_temperature: 1.0
    inter_island_crossover_softmax_temperature: 1.0
  selection_score:
    mode: weighted_sum
    normalize_weights: true
    weights:
      simple_score: 1.0
      inheritance_fitness: 0.0

operators:
  mutation:
    gene_removal_probability: 0.1
  crossover:
    primary_parent_gene_inheritance_probability: 0.7

phases:
  simple:
    eval_mode: full
    timeout_sec_per_eval: 180
    experiments:
      - group_commands_and_wall_planning
    allocation:
      enabled: false
  great_filter:
    enabled: false
    interval_generations: 5
    eval_mode: full
    timeout_sec_per_eval: 120
    top_h_per_island: 5
    experiments:
      - group_commands_and_wall_planning
    allocation:
      enabled: false

llm:
  selection_strategy: random
  seed: 123

  route_weights:
    ollama_nemotron_cascade_2_30b: 1.0
    ollama_qwen35_35b: 1.0
    ollama_gemma4_31b: 1.0
