enabled: false
name: ddpm_cifar10

quality_mode: fast

data:
  root: ${paths.data_root}/cifar10

model:
  base_channels: 64
  channel_mults: [1, 2, 2]
  attention: false
  num_res_blocks: 2

diffusion:
  timesteps: 1000
  schedule_type: linear
  prediction_type: eps
  ema_decay: 0.9999

train:
  eval_every_steps: 200
  log_every_steps: 20

compute:
  device: cuda
  precision: bf16
  batch_size: 128
  max_tokens_per_batch: null
  grad_accum_steps: 1
  max_steps: 50000
  max_epochs: null
  num_workers: 8
  gradient_checkpointing: false
  smoke_steps: 80

safety:
  detect_nan: true
  abort_on_nan: true
  grad_clip_norm: 1.0
  log_grad_norm: true

primary_metric:
  name: ema_loss
  direction: min

target:
  mode: relative
  value: 0.05
  improvement_ratio: 0.30
  patience: null

run_validation:
  max_steps: null
  target_quality: null

normalization:
  quality_ref: 0.05
  steps_ref: 50000
  eps: 1.0e-8

optimizer_defaults:
  name: adam
  params:
    lr: 0.0002
    betas: [0.9, 0.999]
    weight_decay: 0.0
  scheduler:
    type: constant
