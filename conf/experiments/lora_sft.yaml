enabled: false
name: lora_sft

quality_mode: full

data:
  root: ${paths.data_root}/dolly15k
  dataset_name: databricks/databricks-dolly-15k
  max_seq_len: 512
  prompt_template: |
    ### Instruction:
    {instruction}

    {context_block}
    ### Response:
    {response}

model:
  model_name: TinyLlama/TinyLlama-1.1B-Chat-v1.0
  quantization: none

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]

train:
  eval_every_steps: 100
  log_every_steps: 10

compute:
  device: cuda
  precision: bf16
  batch_size: 4
  max_tokens_per_batch: 2048
  grad_accum_steps: 8
  max_steps: 5000
  max_epochs: null
  num_workers: 2
  gradient_checkpointing: true
  smoke_steps: 50

safety:
  detect_nan: true
  abort_on_nan: true
  grad_clip_norm: 1.0
  log_grad_norm: true

primary_metric:
  name: val_loss
  direction: min

target:
  mode: relative
  value: 2.0
  improvement_ratio: 0.20
  patience: 3

run_validation:
  max_steps: null
  target_quality: null

normalization:
  eps: 1.0e-8

optimizer_defaults:
  name: adamw
  params:
    lr: 0.0002
    betas: [0.9, 0.999]
    weight_decay: 0.0
  scheduler:
    type: warmup_cosine
    warmup_ratio: 0.03
