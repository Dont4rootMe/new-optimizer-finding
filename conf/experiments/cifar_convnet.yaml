enabled: true
name: cifar_convnet

data:
  root: ${paths.data_root}/cifar10
  val_split: 5000
  normalize_mean: [0.4914, 0.4822, 0.4465]
  normalize_std: [0.2470, 0.2435, 0.2616]

model:
  arch: resnet18_cifar
  num_classes: 10

train:
  eval_every_steps: 200
  log_every_steps: 20

compute:
  device: cuda
  precision: bf16
  batch_size: 256
  max_tokens_per_batch: null
  grad_accum_steps: 1
  max_steps: 20000
  max_epochs: 200
  num_workers: 8
  gradient_checkpointing: false
  smoke_steps: 100

safety:
  detect_nan: true
  abort_on_nan: true
  grad_clip_norm: 1.0
  log_grad_norm: true

primary_metric:
  name: val_acc
  direction: max

target:
  value: 0.90
  patience: 5

run_validation:
  max_steps: null
  target_quality: null

normalization:
  quality_ref: 0.90
  steps_ref: 20000
  eps: 1.0e-8

optimizer_defaults:
  name: sgd
  params:
    lr: 0.1
    momentum: 0.9
    weight_decay: 0.0005
    nesterov: true
  scheduler:
    type: cosine
    warmup_steps: 0
