_target_: experiments.optimization_survey._runtime.runner.OptimizationSurveyExperimentEvaluator
experiment_target: experiments.optimization_survey.two_spirals.TwoSpiralsExperiment
enabled: true
name: two_spirals


baseline:
  profile_path: ${paths.stats_root}/optimization_survey/${..name}/baseline.json
data:
  samples_per_class: 500
  val_split: 200
  noise_std: 0.02

model:
  hidden_dim: 64

train:
  eval_every_steps: 80
  log_every_steps: 10

compute:
  device: cpu
  precision: fp32
  batch_size: 32
  max_tokens_per_batch: null
  grad_accum_steps: 1
  max_steps: 800
  max_epochs: null
  num_workers: 0
  gradient_checkpointing: false
  smoke_steps: 160

safety:
  detect_nan: true
  abort_on_nan: true
  grad_clip_norm: null
  log_grad_norm: true

primary_metric:
  name: val_acc
  direction: max

target:
  metric: val_acc
  direction: max
  value: 0.90
  patience: 3

run_validation:
  max_steps: null
  target_quality: null

normalization:
  eps: 1.0e-8

optimizer_defaults:
  name: sgd
  params:
    lr: 0.01
    momentum: 0.9
    weight_decay: 0.0
    nesterov: false
  scheduler:
    type: cosine
    warmup_steps: 0
