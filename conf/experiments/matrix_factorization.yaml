enabled: true
name: matrix_factorization

data: {}

model:
  matrix_dim: 20
  rank: 3

train:
  eval_every_steps: 50
  log_every_steps: 10

compute:
  device: cpu
  precision: fp32
  batch_size: 1
  max_tokens_per_batch: null
  grad_accum_steps: 1
  max_steps: 500
  max_epochs: null
  num_workers: 0
  gradient_checkpointing: false
  smoke_steps: 100

safety:
  detect_nan: true
  abort_on_nan: true
  grad_clip_norm: null
  log_grad_norm: true

primary_metric:
  name: val_loss
  direction: min

target:
  metric: val_loss
  direction: min
  value: 0.01
  patience: 3

run_validation:
  max_steps: null
  target_quality: null

normalization:
  eps: 1.0e-8

optimizer_defaults:
  name: sgd
  params:
    lr: 0.001
    momentum: 0.9
    weight_decay: 0.0
    nesterov: false
  scheduler:
    type: cosine
    warmup_steps: 0
