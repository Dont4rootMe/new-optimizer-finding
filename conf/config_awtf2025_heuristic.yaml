defaults:
  - evolver: awtf2025_heuristic
  - api_platforms@api_platforms.ollama_nemotron_cascade_2_30b: ollama_nemotron_cascade_2_30b
  - api_platforms@api_platforms.ollama_qwen35_35b: ollama_qwen35_35b
  - api_platforms@api_platforms.ollama_gemma4_31b: ollama_gemma4_31b
  - experiments@experiments.group_commands_and_wall_planning: awtf2025_heuristic/group_commands_and_wall_planning
  - _self_

seed: 42
deterministic: false
mode: evolve
device: cpu
precision: fp32
num_workers: 0

resources:
  evaluation:
    gpu_ranks: []
    cpu_parallel_jobs: 25

paths:
  data_root: ${oc.env:AIFS_DATA_ROOT,./data}
  stats_root: ${oc.env:AIFS_STATS_ROOT,./stats}
  runs_root: ${oc.env:AIFS_RUNS_ROOT,./runs}
  candidate_results_dirname: results
  population_root: ${oc.env:POP_ROOT,./populations/atcoder_awt}
  api_platform_runtime_root: ${oc.env:API_PLATFORM_RUNTIME_ROOT,./.api_platform_runtime_atcoder_awt}
  ollama_cache_root: ${oc.env:OLLAMA_MODELS,./ollama_cache}

evolver:
  llm:
    route_weights:
      ollama_gemma4_31b: 1.0
      ollama_qwen35_35b: 1.0

api_platforms:
  ollama_gemma4_31b:
    base_url: ${oc.env:OLLAMA_GEMMA4_31B_BASE_URL,http://127.0.0.1:12454/api}
    gpu_ranks: 
      - [0]
      - [1]
      - [2]
      - [3]
    max_concurrency: 3
    stage_options:
      design:
        think: false
        max_output_tokens: 9000
      implementation:
        think: false
        max_output_tokens: 9000
      repair:
        think: false
        max_output_tokens: 9000
      novelty_check:
        think: false
        max_output_tokens: 9000

  ollama_qwen35_35b:
    base_url: ${oc.env:OLLAMA_QWEN35_35B_BASE_URL,http://127.0.0.1:12444/api}
    gpu_ranks: 
      - [4]
      - [5]
      - [6]
      - [7]
    max_concurrency: 3
    stage_options:
      design:
        think: false
        max_output_tokens: 9000
      implementation:
        think: false
        max_output_tokens: 9000
      repair:
        think: false
        max_output_tokens: 9000
      novelty_check:
        think: false
        max_output_tokens: 9000

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  output_subdir: hydra
  job:
    chdir: false
