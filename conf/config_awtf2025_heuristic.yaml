defaults:
  - evolver: awtf2025_heuristic
  - api_platforms@api_platforms.ollama_qwen35_27b: ollama_qwen35_27b
  - api_platforms@api_platforms.ollama_gemma4_26b: ollama_gemma4_26b
  - experiments@experiments.group_commands_and_wall_planning: awtf2025_heuristic/group_commands_and_wall_planning
  - _self_

seed: 42
deterministic: false
mode: evolve
device: cpu
precision: fp32
num_workers: 0

resources:
  evaluation:
    gpu_ranks: []
    cpu_parallel_jobs: 5

paths:
  data_root: ${oc.env:AIFS_DATA_ROOT,./data}
  stats_root: ${oc.env:AIFS_STATS_ROOT,./stats}
  runs_root: ${oc.env:AIFS_RUNS_ROOT,./runs}
  candidate_results_dirname: results
  population_root: ${oc.env:POP_ROOT,./populations}
  api_platform_runtime_root: ${oc.env:API_PLATFORM_RUNTIME_ROOT,./.api_platform_runtime}
  ollama_cache_root: ${oc.env:OLLAMA_MODELS,./ollama_cache}

evolver:
  creation:
    max_parallel_organisms: 2
  llm:
    route_weights:
      ollama_qwen35_27b: 1.0
      ollama_gemma4_26b: 1.0

api_platforms:
  ollama_qwen35_27b:
    base_url: ${oc.env:OLLAMA_QWEN35_27B_BASE_URL,http://127.0.0.1:12435/api}
    gpu_ranks: [1]
    max_concurrency: 2
    stage_options:
      design:
        think: high
      implementation:
        think: false
        temperature: 0.2
      repair:
        think: low
      novelty_check:
        think: high

  ollama_gemma4_26b:
    base_url: ${oc.env:OLLAMA_GEMMA4_26B_BASE_URL,http://127.0.0.1:12434/api}
    gpu_ranks: [0]
    max_concurrency: 2
    stage_options:
      design:
        think: high
      implementation:
        think: false
        temperature: 0.2
      repair:
        think: low
      novelty_check:
        think: high

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  output_subdir: hydra
  job:
    chdir: false
