defaults:
  - evolver: awtf2025_heuristic
  - api_platforms@api_platforms.ollama_nemotron_cascade_2_30b: ollama_nemotron_cascade_2_30b
  - api_platforms@api_platforms.ollama_qwen35_35b: ollama_qwen35_35b
  - api_platforms@api_platforms.ollama_gemma4_31b: ollama_gemma4_31b
  - experiments@experiments.group_commands_and_wall_planning: awtf2025_heuristic/group_commands_and_wall_planning
  - _self_

seed: 42
deterministic: false
mode: evolve
device: cpu
precision: fp32
num_workers: 0

resources:
  evaluation:
    gpu_ranks: []
    cpu_parallel_jobs: 25

paths:
  data_root: ${oc.env:AIFS_DATA_ROOT,./data}
  stats_root: ${oc.env:AIFS_STATS_ROOT,./stats}
  runs_root: ${oc.env:AIFS_RUNS_ROOT,./runs}
  candidate_results_dirname: results
  population_root: ${oc.env:POP_ROOT,./populations}
  api_platform_runtime_root: ${oc.env:API_PLATFORM_RUNTIME_ROOT,./.api_platform_runtime}
  ollama_cache_root: ${oc.env:OLLAMA_MODELS,./ollama_cache}

evolver:
  creation:
    max_parallel_organisms: 5
  llm:
    route_weights:
      ollama_nemotron_cascade_2_30b: 1.0
      ollama_qwen35_35b: 1.0
      ollama_gemma4_31b: 1.0

api_platforms:
  ollama_nemotron_cascade_2_30b:
    base_url: ${oc.env:OLLAMA_NEMOTRON_CASCADE_2_30B_BASE_URL,http://127.0.0.1:12436/api}
    gpu_ranks: [2]
    max_concurrency: 2
    stage_options:
      design:
        think: medium
        max_output_tokens: 12288
      implementation:
        think: low
        max_output_tokens: 12288
        temperature: 0.2
      repair:
        think: low
        max_output_tokens: 12288
      novelty_check:
        think: low
        max_output_tokens: 12288

  ollama_qwen35_35b:
    base_url: ${oc.env:OLLAMA_QWEN35_35B_BASE_URL,http://127.0.0.1:12435/api}
    gpu_ranks: [1]
    max_concurrency: 2
    stage_options:
      design:
        think: medium
        max_output_tokens: 12288
      implementation:
        think: low
        max_output_tokens: 12288
        temperature: 0.2
      repair:
        think: low
        max_output_tokens: 12288
      novelty_check:
        think: low
        max_output_tokens: 12288

  ollama_gemma4_31b:
    base_url: ${oc.env:OLLAMA_GEMMA4_31B_BASE_URL,http://127.0.0.1:12434/api}
    gpu_ranks: [0]
    max_concurrency: 2
    stage_options:
      design:
        think: medium
        max_output_tokens: 12288
      implementation:
        think: low
        max_output_tokens: 12288
        temperature: 0.2
      repair:
        think: low
        max_output_tokens: 12288
      novelty_check:
        think: low
        max_output_tokens: 12288

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  output_subdir: hydra
  job:
    chdir: false
