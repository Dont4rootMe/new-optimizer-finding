defaults:
  - evolver: awtf2025_heuristic
  - api_platforms@api_platforms.ollama_gemma4_31b: ollama_gemma4_31b
  - api_platforms@api_platforms.ollama_qwen35_122b: ollama_qwen35_122b
  - experiments@experiments.group_commands_and_wall_planning: awtf2025_heuristic/group_commands_and_wall_planning
  - _self_

seed: 42
deterministic: false
mode: evolve
device: cpu
precision: fp32
num_workers: 0

resources:
  evaluation:
    gpu_ranks: []
    cpu_parallel_jobs: 25

paths:
  data_root: ${oc.env:AIFS_DATA_ROOT,./data}
  stats_root: ${oc.env:AIFS_STATS_ROOT,./stats}
  runs_root: ${oc.env:AIFS_RUNS_ROOT,./runs}
  candidate_results_dirname: results
  population_root: ${oc.env:POP_ROOT,./populations/atcoder_awt}
  api_platform_runtime_root: ${oc.env:API_PLATFORM_RUNTIME_ROOT,./.api_platform_runtime_atcoder_awt}
  ollama_cache_root: ${oc.env:OLLAMA_MODELS,./ollama_cache}


api_platforms:
  # Gemma 4 31B holds GPUs 6 and 7 as two single-GPU instances. It
  # runs the cheap validator stages of every pipeline (compatibility,
  # novelty, repair) and one all-gemma pipeline keeps the legacy
  # fast-and-cheap path available for the bandit.
  ollama_gemma4_31b:
    base_url: ${oc.env:OLLAMA_GEMMA4_31B_BASE_URL,http://127.0.0.1:12454/api}
    gpu_ranks:
      - [6]
      - [7]
    max_concurrency: 3
    stage_options:
      design:
        think: false
        max_output_tokens: 9000
      implementation:
        think: false
        max_output_tokens: 9000
      repair:
        think: false
        max_output_tokens: 9000
      novelty_check:
        think: false
        max_output_tokens: 9000

  # Qwen 3.5 122B holds GPUs 0–5 as two 3-GPU instances. It runs the
  # creative stages (rationalization, design, implementation) where the
  # extra reasoning capacity should buy score, but only inside the
  # "qwen_creative_gemma_check" pipeline so the bandit can compare it
  # to the all-gemma baseline.
  ollama_qwen35_122b:
    base_url: ${oc.env:OLLAMA_QWEN35_122B_BASE_URL,http://127.0.0.1:12422/api}
    gpu_ranks:
      - [0, 1, 2]
      - [3, 4, 5]
    max_concurrency: 2

comet:
  enabled: true
  api_key: RrClhd4FveFQKO4qLo4jBjrKu
  project_name: ${oc.env:COMET_PROJECT,new-optimizer-search}
  workspace: ${oc.env:COMET_WORKSPACE,dont4rootme}
  run_name: ${oc.env:COMET_RUN_NAME,awtf2025_heuristic}
  experiment_name: null
  log_combined_overview: true
  log_individual_panels: true
  log_plotly: true
  log_step_per_generation: true

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  output_subdir: hydra
  job:
    chdir: false
